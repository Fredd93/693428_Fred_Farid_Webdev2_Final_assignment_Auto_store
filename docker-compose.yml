services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./app:/app
      - vue_dist:/usr/share/nginx/html
    depends_on:
      - php
      - vue_build

  vue_build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npm run build && cp -r /app/dist/* /dist/"
    volumes:
      - vue_dist:/dist

  php:
    build:
      context: .
      dockerfile: PHP.Dockerfile
    volumes:
      - ./app:/app
    environment:
      DB_HOST: mysql
      DB_NAME: grand_transmission_auto
      DB_USER: developer
      DB_PASSWORD: secret123
      DB_CHARSET: utf8mb4
      APP_SECRET: gta_jwt_secret_change_in_prod
    depends_on:
      - mysql
      - mailhog

  mysql:
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: 'secret123'
      MYSQL_USER: 'developer'
      MYSQL_PASSWORD: 'secret123'
      MYSQL_DATABASE: 'grand_transmission_auto'
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8090:8080"
    environment:
      SWAGGER_JSON: /docs/openapi.yaml
    volumes:
      - ./app/docs:/docs

volumes:
  mysqldata: {}
  vue_dist: {}
